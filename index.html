<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arman Seguridad Privada</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <main class="glass-container">
        <header>
            <div class="logo">🛡️ Arman Seguridad Privada</div>
        </header>
        
        <section class="hero-content">
            <h1>Protegemos lo que más te importa</h1>
            <p>Soluciones integrales de seguridad privada para tu tranquilidad. Déjanos tu correo y nos pondremos en contacto.</p>
            
            <form id="notify-form" class="notify-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Ingresa tu correo" required>
                    <button type="submit" class="btn-primary">
                        <span>Avisarme</span>
                        <svg viewBox="0 0 24 24" fill="none" class="arrow-icon">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <p id="form-msg" class="form-message"></p>
            </form>
        </section>
        
        <footer>
            <div class="social-links">
                <a href="#" class="social-icon">Twitter</a>
                <a href="#" class="social-icon">LinkedIn</a>
                <a href="#" class="social-icon">Instagram</a>
            </div>
            <p>&copy; 2026 EmpresaGenial. Todos los derechos reservados.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
